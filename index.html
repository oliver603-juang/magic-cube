<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>魔方小老師</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:#000;color:#fff;height:100dvh;overflow:hidden;display:flex;flex-direction:column}
.wrap{position:relative;flex:1;overflow:hidden}
video{width:100%;height:100%;object-fit:cover}
canvas#ov{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

.top-bar{position:absolute;top:0;left:0;right:0;z-index:10;padding:10px 16px;text-align:center;background:linear-gradient(rgba(0,0,0,.8),transparent);padding-bottom:28px}
.top-title{font-size:18px;font-weight:900;color:#FFD700}
.top-sub{font-size:12px;color:#ddd;margin-top:2px}
.top-dots{display:flex;justify-content:center;gap:5px;margin-top:6px}
.td{width:20px;height:5px;border-radius:3px;background:rgba(255,255,255,.15)}
.td.done{background:#00D2FF}
.td.now{background:#FFD700;width:32px}

.bot-bar{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:8px 16px 20px;background:linear-gradient(transparent,rgba(0,0,0,.9));padding-top:24px;text-align:center}
.info{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:8px}
.mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;width:78px;margin:0 auto 8px}
.mcell{height:22px;border-radius:3px;border:1px solid rgba(255,255,255,.15)}
.btn{padding:14px 32px;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;cursor:pointer;background:#FFD700;color:#000;min-width:120px}
.btn:active{transform:scale(.96);opacity:.9}
.btn-sm{padding:10px 20px;font-size:14px}
.btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}

.overlay{display:none;position:absolute;inset:0;z-index:25;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.85)}
.overlay.show{display:flex}

.step-dots{display:flex;gap:3px;justify-content:center;flex-wrap:wrap;max-width:300px;margin:6px auto 0}
.sd{width:16px;height:16px;border-radius:4px;font-size:7px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.08);color:rgba(255,255,255,.3);font-family:monospace;font-weight:700}
.sd.now{background:#FFD700;color:#000}
.sd.done{background:rgba(0,210,255,.25);color:#00D2FF}

.persp{display:none;position:absolute;bottom:80px;right:8px;z-index:12;width:100px;height:100px;background:rgba(0,0,0,.75);border-radius:10px;padding:4px}
.persp.show{display:block}
.persp canvas{width:100%;height:100%}
</style>
</head>
<body>
<div class="wrap">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="ov"></canvas>

  <div class="top-bar" id="topBar">
    <div class="top-title" id="title">🧊 魔方小老師</div>
    <div class="top-sub" id="sub"></div>
    <div class="top-dots" id="dots"></div>
  </div>

  <div class="bot-bar" id="botBar" style="display:none">
    <div class="info" id="info"></div>
    <div class="mgrid" id="mgrid" style="display:none"></div>
    <div class="btn-row" id="btnRow"></div>
  </div>

  <!-- Solve mode UI: full black background, before/after grids + move diagram -->
  <div id="solveUI" style="display:none;position:absolute;inset:0;z-index:10;background:#000;flex-direction:column;align-items:center;justify-content:space-between;padding:10px 16px 16px;overflow-y:auto">
    <div style="text-align:center;width:100%">
      <div style="font-size:11px;color:rgba(255,255,255,.4)">操作前（前紅面）</div>
      <div class="mgrid" id="beforeGrid" style="display:grid;margin:4px auto"></div>
    </div>
    <div style="text-align:center;width:100%;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center">
      <div style="font-size:36px;font-weight:900;color:#FFD700;font-family:'Courier New',monospace" id="sMoveLabel">-</div>
      <div style="font-size:15px;color:#eee;margin-top:2px" id="sMoveDesc">-</div>
      <div style="font-size:11px;color:rgba(255,255,255,.4);margin-top:4px" id="sMoveProg">-</div>
      <div id="sStepDots" style="margin-top:6px"></div>
      <div id="sMoveVis" style="margin-top:10px"></div>
    </div>
    <div style="text-align:center;width:100%">
      <div style="font-size:11px;color:rgba(255,255,255,.4)">操作後（前紅面應該變成）</div>
      <div class="mgrid" id="afterGrid" style="display:grid;margin:4px auto"></div>
      <div class="btn-row" id="sBtnRow" style="margin-top:8px"></div>
    </div>
  </div>

  <div class="persp" id="persp"><canvas id="perspC" width="92" height="92"></canvas></div>

  <!-- Start -->
  <div class="overlay show" id="startOv">
    <div style="font-size:48px;margin-bottom:8px">🧊</div>
    <div style="font-size:22px;font-weight:900;color:#FFD700">魔方小老師</div>
    <div style="font-size:13px;color:rgba(255,255,255,.5);margin-top:4px;max-width:260px;text-align:center;line-height:1.5">
      用相機掃描 6 面 → 自動最佳解 → 一步步教你還原<br>全程白色朝上！
    </div>
    <button class="btn" style="margin-top:16px" onclick="startApp()">📸 開始掃描</button>
    <button class="btn" style="margin-top:8px;background:rgba(0,210,255,.85)" onclick="startLBLDirect()">📚 LBL 逆向教學</button>
    <button class="btn" style="margin-top:8px;background:rgba(255,255,255,.15);color:#ccc" onclick="showDojo()">💪 肌肉記憶道場</button>
    <button class="btn btn-sm" style="margin-top:12px;background:rgba(255,100,0,.3);color:#f90" onclick="debugTestSolver()">🔧 測試求解器</button>
  </div>

  <!-- Muscle Memory Dojo -->
  <div class="overlay" id="dojoOv" style="justify-content:flex-start;padding-top:30px;overflow-y:auto">
    <div id="dojoContent"></div>
  </div>

  <!-- Solving spinner -->
  <div class="overlay" id="solveOv">
    <div style="font-size:40px;animation:spin 1s linear infinite">⚙️</div>
    <div style="font-size:16px;font-weight:800;color:#FFD700;margin-top:10px">計算最佳解中...</div>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}
  @keyframes confetti-fall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}</style>

  <!-- Complete -->
  <div class="overlay" id="doneOv">
    <div style="font-size:64px">🎉</div>
    <div style="font-size:24px;font-weight:900;color:#00D2FF;margin-top:8px">魔方還原完成！</div>
    <button class="btn" style="margin-top:16px" onclick="location.reload()">再來一次</button>
  </div>

  <!-- Error -->
  <div class="overlay" id="errOv">
    <div style="font-size:40px">⚠️</div>
    <div style="font-size:16px;color:#E94560;margin-top:8px;max-width:280px;text-align:center" id="errMsg"></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:10px" id="errFaces"></div>
    <button class="btn" style="margin-top:14px" onclick="location.reload()">重新開始</button>
  </div>
</div>

<script id="cubejs-src" type="text/plain">

function initSolver(){
  const lib=document.getElementById('cubejs-src').textContent;
  const code=lib+`\nconst C=self.Cube||(typeof Cube!=='undefined'?Cube:null);let rdy=false;self.onmessage=function(e){if(e.data.t==='init'){try{C.initSolver();rdy=true;postMessage({t:'ok'})}catch(er){postMessage({t:'err',m:er.message})}}if(e.data.t==='solve'){if(!rdy){C.initSolver();rdy=true}try{const c=C.fromString(e.data.fl);postMessage({t:'sol',s:c.solve()})}catch(er){postMessage({t:'err',m:er.message})}}};`;
  solverWorker=new Worker(URL.createObjectURL(new Blob([code],{type:'application/javascript'})));
  solverReady=false;
  solverWorker.onmessage=e=>{
    if(e.data.t==='ok'){solverReady=true;console.log('[solver] Worker ready');}
    if(e.data.t==='sol'&&solverCB)solverCB(null,e.data.s);
    if(e.data.t==='err'&&solverCB)solverCB(new Error(e.data.m));
  };
  solverWorker.onerror=e=>{
    console.error('[solver] Worker error:',e.message);
    solverReady=true; // unblock the wait loop
    if(solverCB)solverCB(new Error('Worker crashed: '+e.message));
  };
  solverWorker.postMessage({t:'init'});
}

function drawGuideGrid(){
  if(!ov.width)return;
  const vw=ov.width,vh=ov.height;
  octx.clearRect(0,0,vw,vh);
  const gs=Math.min(vw,vh)*0.82,cs=gs/3,sx=(vw-gs)/2,sy=(vh-gs)/2;
  octx.fillStyle='rgba(0,0,0,.25)';
  octx.fillRect(0,0,vw,sy);octx.fillRect(0,sy+gs,vw,vh-sy-gs);
  octx.fillRect(0,sy,sx,gs);octx.fillRect(sx+gs,sy,vw-sx-gs,gs);
  octx.strokeStyle='rgba(255,215,0,.5)';octx.lineWidth=1.5;
  for(let i=0;i<=3;i++){
    octx.beginPath();octx.moveTo(sx+i*cs,sy);octx.lineTo(sx+i*cs,sy+gs);octx.stroke();
    octx.beginPath();octx.moveTo(sx,sy+i*cs);octx.lineTo(sx+gs,sy+i*cs);octx.stroke();
  }
  octx.strokeStyle='#FFD700';octx.lineWidth=3;
  const m=14;
  [[sx,sy],[sx+gs,sy],[sx,sy+gs],[sx+gs,sy+gs]].forEach(([x,y])=>{
    const dx=x===sx?1:-1,dy=y===sy?1:-1;
    octx.beginPath();octx.moveTo(x+m*dx,y);octx.lineTo(x,y);octx.lineTo(x,y+m*dy);octx.stroke();
  });
}

function doScanCapture(){
  if(!vid.videoWidth)return;
  const vw=vid.videoWidth,vh=vid.videoHeight;
  const tc=document.createElement('canvas');tc.width=vw;tc.height=vh;
  const tctx=tc.getContext('2d');tctx.drawImage(vid,0,0,vw,vh);
  const gs=Math.min(vw,vh)*0.82,cs=gs/3,sx=(vw-gs)/2,sy=(vh-gs)/2;

  let rgbs=[];
  for(let r=0;r<3;r++)for(let c=0;c<3;c++){
    const px=Math.round(sx+(c+.5)*cs),py=Math.round(sy+(r+.5)*cs);
    const d=tctx.getImageData(px-5,py-5,11,11);
    let rr=0,gg=0,bb=0;
    for(let i=0;i<d.data.length;i+=4){rr+=d.data[i];gg+=d.data[i+1];bb+=d.data[i+2];}
    const n=d.data.length/4;
    rgbs.push([Math.round(rr/n),Math.round(gg/n),Math.round(bb/n)]);
  }
  rawData[SCAN_SEQ[scanIdx].f]=rgbs;
  if(navigator.vibrate)navigator.vibrate(80);

  // Show preview
  const mg=document.getElementById('mgrid');mg.style.display='grid';
  mg.innerHTML=rgbs.map(([r,g,b],i)=>`<div class="mcell" style="background:rgb(${r},${g},${b})">${i===4?'⭐':''}</div>`).join('');

  // Advance to next
  scanIdx++;
  if(scanIdx>=SCAN_SEQ.length){
    // All 6 done
    document.getElementById('title').textContent='✅ 6 面拍攝完成！';
    document.getElementById('sub').textContent='按下方按鈕分析顏色';
    document.getElementById('info').textContent='';
    document.getElementById('btnRow').innerHTML='<button class="btn" onclick="doClassify()">🔍 分析顏色</button>';
  }else{
    // Show next face instruction directly (not as button)
    const next=SCAN_SEQ[scanIdx];
    document.getElementById('title').textContent=`下一面：${next.name}`;
    document.getElementById('sub').textContent=next.guide;
    document.getElementById('dots').innerHTML=SCAN_SEQ.map((_,i)=>
      `<div class="td${i<scanIdx?' done':''}${i===scanIdx?' now':''}"></div>`).join('');
    document.getElementById('info').textContent=`✅ 已拍 ${scanIdx}/6，轉好後按拍照`;
    // Keep shoot button always visible
    document.getElementById('btnRow').innerHTML='<button class="btn" onclick="doScanCapture()">📸 拍照</button>';
  }
}

// ===== GLOBAL CLASSIFY + AUTO-REPAIR =====
function doClassify(){
  try{ doClassifyInner(); }catch(e){
    showError('分析錯誤: '+e.message);
    console.error(e);
  }
}
function doClassifyInner(){
  const FO=['U','R','F','D','L','B'];
  const all=[];
  FO.forEach(f=>{const r=rawData[f];if(!r)return;for(let i=0;i<9;i++)all.push({face:f,pos:i,rgb:r[i],color:null});});
  if(all.length!==54){showError('只有 '+all.length+' 個色塊');return;}

  const anchors={};FO.forEach(f=>{anchors[CC[f]]=rawData[f][4];});
  all.forEach(s=>{if(s.pos===4)s.color=CC[s.face];});

  // HSV conversion
  function toHSV(r,g,b){
    const rf=r/255,gf=g/255,bf=b/255;
    const mx=Math.max(rf,gf,bf),mn=Math.min(rf,gf,bf),d=mx-mn;
    const v=mx,s=mx>0?d/mx:0;
    let h=0;
    if(d>0.001){
      if(mx===rf)h=60*(((gf-bf)/d)%6);
      else if(mx===gf)h=60*((bf-rf)/d+2);
      else h=60*((rf-gf)/d+4);
      if(h<0)h+=360;
    }
    return [h,s,v];
  }

  // Smart distance: HSV-based with R-channel boost for red/orange zone
  function smartDist(r,g,b,ar,ag,ab,c){
    const [h,s,v]=toHSV(r,g,b);
    const [ah,as,av]=toHSV(ar,ag,ab);
    // White: low saturation → distance based on saturation diff
    if(c==='W') return s*5 + Math.abs(v-av)*2;
    // Skip white anchor for saturated pixels
    if(s<0.15) return 10; // saturated pixel shouldn't match unsaturated anchor
    // Hue distance (circular)
    let hd=Math.abs(h-ah); hd=Math.min(hd,360-hd);
    // Red/Orange zone (both hue near 0/360°): use R-channel as primary
    const inRO=(h>300||h<40)&&(ah>300||ah<40);
    if(inRO){
      const rDiff=Math.abs(r-ar)/255;
      const vDiff=Math.abs(v-av);
      return rDiff*100 + vDiff*50 + hd*0.5;
    }
    // Normal: hue distance + value diff
    return hd + Math.abs(v-av)*30;
  }

  const nonC=all.filter(s=>s.pos!==4);
  nonC.forEach(s=>{
    s.dists={};
    Object.entries(anchors).forEach(([c,[ar,ag,ab]])=>{
      const[r,g,b]=s.rgb;
      s.dists[c]=smartDist(r,g,b,ar,ag,ab,c);
    });
  });

  // Greedy assignment
  const cnt={W:1,R:1,B:1,O:1,G:1,Y:1};
  const cands=[];
  nonC.forEach(s=>{Object.entries(s.dists).forEach(([c,d])=>{cands.push({s,c,d});});});
  cands.sort((a,b)=>a.d-b.d);
  cands.forEach(({s,c})=>{if(s.color||cnt[c]>=9)return;s.color=c;cnt[c]++;});
  nonC.filter(s=>!s.color).forEach(s=>{
    const a=Object.entries(cnt).find(([c,n])=>n<9);
    if(a){s.color=a[0];cnt[a[0]]++;}
  });

  // Calculate ambiguity for each sticker (needed for edge constraint fixing)
  nonC.forEach(s=>{
    const sorted=Object.entries(s.dists).sort((a,b)=>a[1]-b[1]);
    s.bestDist=sorted[0][1];
    s.secondColor=sorted[1][0];
    s.secondDist=sorted[1][1];
    s.ambiguity=s.secondDist>0?(s.secondDist-s.bestDist)/s.secondDist:1;
  });

  FO.forEach(f=>{faceColors[f]=all.filter(s=>s.face===f).sort((a,b)=>a.pos-b.pos).map(s=>s.color);});

  // === EDGE CONSTRAINT VALIDATION ===
  // Adjacent faces share edge/corner stickers. Opposite colors (R↔O, W↔Y, B↔G)
  // can NEVER appear on the same edge. If they do, swap the more ambiguous one.
  const invalidPairs=[['R','O'],['W','Y'],['B','G']];
  function isInvalidEdge(c1,c2){
    // Opposite colors can't share an edge
    if(invalidPairs.some(([a,b])=>(c1===a&&c2===b)||(c1===b&&c2===a))) return true;
    // Same color can't share an edge either
    if(c1===c2) return true;
    return false;
  }
  
  // ALL 36 adjacency pairs (cube folded into 3D)
  const edgeConstraints=[
    // Side↔Side (12 pairs)
    ['F',5,'R',3], ['R',5,'B',3], ['B',5,'L',3], ['L',5,'F',3],
    ['F',2,'R',0], ['R',2,'B',0], ['B',2,'L',0], ['L',2,'F',0],
    ['F',8,'R',6], ['R',8,'B',6], ['B',8,'L',6], ['L',8,'F',6],
    // U↔Side (12 pairs)
    ['U',6,'F',0], ['U',7,'F',1], ['U',8,'F',2],
    ['U',8,'R',0], ['U',5,'R',1], ['U',2,'R',2],
    ['U',2,'B',0], ['U',1,'B',1], ['U',0,'B',2],
    ['U',0,'L',0], ['U',3,'L',1], ['U',6,'L',2],
    // D↔Side (12 pairs)
    ['D',0,'F',6], ['D',1,'F',7], ['D',2,'F',8],
    ['D',2,'R',6], ['D',5,'R',7], ['D',8,'R',8],
    ['D',8,'B',6], ['D',7,'B',7], ['D',6,'B',8],
    ['D',0,'L',8], ['D',3,'L',7], ['D',6,'L',6],
  ];
  
  let fixCount=0;
  for(let pass=0;pass<3;pass++){ // multiple passes since fixing one might affect another
    for(const [f1,p1,f2,p2] of edgeConstraints){
      const c1=faceColors[f1][p1], c2=faceColors[f2][p2];
      if(isInvalidEdge(c1,c2)){
        // Find the sticker objects
        const s1=nonC.find(s=>s.face===f1&&s.pos===p1);
        const s2=nonC.find(s=>s.face===f2&&s.pos===p2);
        if(!s1||!s2) continue;
        // Swap the more ambiguous one to its 2nd choice
        if(s1.ambiguity<s2.ambiguity){
          // s1 is more ambiguous → change it
          s1.color=s1.secondColor;
          faceColors[f1][p1]=s1.secondColor;
        }else{
          s2.color=s2.secondColor;
          faceColors[f2][p2]=s2.secondColor;
        }
        fixCount++;
      }
    }
  }
  if(fixCount>0) console.log('Edge constraint fixes:', fixCount);

  // === CUBIE UNIQUENESS CONSTRAINT ===
  // Each edge (2-color combo) and corner (3-color combo) must be unique.
  // If duplicates found, swap the more ambiguous sticker of the duplicate.
  const fc=faceColors; // shorthand
  
  // 12 edge cubies: [face1,pos1, face2,pos2]
  const edgeCubies=[
    ['U',7,'F',1], ['U',5,'R',1], ['U',1,'B',1], ['U',3,'L',1],
    ['D',1,'F',7], ['D',5,'R',7], ['D',7,'B',7], ['D',3,'L',7],
    ['F',5,'R',3], ['F',3,'L',5], ['B',3,'R',5], ['B',5,'L',3],
  ];
  // 8 corner cubies: [face1,pos1, face2,pos2, face3,pos3]
  const cornerCubies=[
    ['U',8,'F',2,'R',0], ['U',6,'F',0,'L',2], ['U',2,'B',0,'R',2], ['U',0,'B',2,'L',0],
    ['D',2,'F',8,'R',6], ['D',0,'F',6,'L',8], ['D',8,'B',6,'R',8], ['D',6,'B',8,'L',6],
  ];

  function getEdgeKey(i){
    const [f1,p1,f2,p2]=edgeCubies[i];
    return [fc[f1][p1],fc[f2][p2]].sort().join('-');
  }
  function getCornerKey(i){
    const [f1,p1,f2,p2,f3,p3]=cornerCubies[i];
    return [fc[f1][p1],fc[f2][p2],fc[f3][p3]].sort().join('-');
  }

  // Check for duplicate edges
  let cubieFixCount=0;
  for(let pass=0;pass<3;pass++){
    // Edges
    for(let i=0;i<edgeCubies.length;i++){
      for(let j=i+1;j<edgeCubies.length;j++){
        if(getEdgeKey(i)===getEdgeKey(j)){
          // Duplicate! Find the more ambiguous sticker among all 4 positions
          const stickers=[];
          [edgeCubies[i],edgeCubies[j]].forEach(([f1,p1,f2,p2])=>{
            const s1=nonC.find(s=>s.face===f1&&s.pos===p1);
            const s2=nonC.find(s=>s.face===f2&&s.pos===p2);
            if(s1)stickers.push({s:s1,f:f1,p:p1});
            if(s2)stickers.push({s:s2,f:f2,p:p2});
          });
          // Sort by ambiguity (most ambiguous first) and swap it
          stickers.sort((a,b)=>(a.s.ambiguity||1)-(b.s.ambiguity||1));
          if(stickers[0]&&stickers[0].s.secondColor){
            stickers[0].s.color=stickers[0].s.secondColor;
            fc[stickers[0].f][stickers[0].p]=stickers[0].s.secondColor;
            cubieFixCount++;
          }
        }
      }
    }
    // Corners
    for(let i=0;i<cornerCubies.length;i++){
      for(let j=i+1;j<cornerCubies.length;j++){
        if(getCornerKey(i)===getCornerKey(j)){
          const stickers=[];
          [cornerCubies[i],cornerCubies[j]].forEach(cb=>{
            for(let k=0;k<cb.length;k+=2){
              const s=nonC.find(st=>st.face===cb[k]&&st.pos===cb[k+1]);
              if(s)stickers.push({s,f:cb[k],p:cb[k+1]});
            }
          });
          stickers.sort((a,b)=>(a.s.ambiguity||1)-(b.s.ambiguity||1));
          if(stickers[0]&&stickers[0].s.secondColor){
            stickers[0].s.color=stickers[0].s.secondColor;
            fc[stickers[0].f][stickers[0].p]=stickers[0].s.secondColor;
            cubieFixCount++;
          }
        }
      }
    }
  }
  if(cubieFixCount>0) console.log('Cubie uniqueness fixes:', cubieFixCount);

  // Build facelet
  let fl='';FO.forEach(f=>{faceColors[f].forEach(x=>fl+=C2F[x]||'?');});
  const fcnt={};for(const ch of fl)fcnt[ch]=(fcnt[ch]||0)+1;
  const ok=!fl.includes('?')&&Object.values(fcnt).every(v=>v===9);
  if(!ok){showError('顏色數量不對: '+JSON.stringify(fcnt));return;}

  // Sort by ambiguity: most ambiguous first
  const ambiguous=nonC.filter(s=>s.ambiguity<0.3).sort((a,b)=>a.ambiguity-b.ambiguity);
  
  const anchorStr=Object.entries(anchors).map(([c,[r,g,b]])=>`${c}=(${r},${g},${b})`).join(' ');
  
  // Try to solve — if invalid, auto-swap ambiguous pairs
  document.getElementById('info').innerHTML=`分析完成，驗證中...<br><span style="font-size:9px;color:rgba(255,255,255,.35)">${anchorStr}</span>`;
  showFacePreviews('mgrid');
  document.getElementById('btnRow').innerHTML='<div style="color:rgba(255,255,255,.5);font-size:12px">驗證魔方狀態...</div>';

  tryAutoRepair(fl, nonC, ambiguous, 0);
}

function tryAutoRepair(fl, nonC, ambiguous, attempt){
  if(attempt>20){
    document.getElementById('info').innerHTML='<span style="color:#E94560">自動修正失敗，請手動確認顏色</span>';
    showEditableFaces();
    document.getElementById('btnRow').innerHTML='<button class="btn" onclick="finalizeSolve()">✅ 確認後解題</button>';
    return;
  }

  const dbg=s=>{document.getElementById('info').textContent=s;console.log('[solver]',s);};
  dbg(attempt===0?'驗證中... 初始化求解器':'修正嘗試 '+(attempt)+' 初始化求解器');

  // Kill old worker and create new one
  if(solverWorker) solverWorker.terminate();
  initSolver();

  // Wait for solver ready with safety timeout
  let waitCount=0;
  function sendWhenReady(){
    waitCount++;
    if(solverReady){
      dbg(attempt===0?'求解器就緒，驗證中...':'修正嘗試 '+attempt+' 求解中...');
      doSend();
    }else if(waitCount>100){
      // 10 seconds timeout for init
      dbg('求解器初始化超時，重試...');
      tryAutoRepair(fl, nonC, ambiguous, attempt);
    }else{
      setTimeout(sendWhenReady,100);
    }
  }
  function doSend(){
    dbg('發送求解請求... fl='+fl.substring(0,12)+'...');
    const solveTimeout=setTimeout(()=>{
      dbg('求解超時(4s)，嘗試修正 #'+(attempt+1));
      // Solver timed out = invalid state. Kill it.
      solverWorker.terminate();
      solverCB=null;

      // Swap the most ambiguous sticker
      if(attempt<ambiguous.length){
        const s=ambiguous[attempt];
        const swapPartner=ambiguous.find(p=>p!==s&&p.color===s.secondColor&&
          (p.secondColor===s.color||p.dists[s.color]<p.dists[p.color]*1.5));
        
        if(swapPartner){
          const tmp=s.color;s.color=swapPartner.color;swapPartner.color=tmp;
        }else{
          const otherSame=nonC.find(p=>p!==s&&p.color===s.secondColor&&p.ambiguity<0.5);
          if(otherSame){
            const old=s.color;
            s.color=s.secondColor;
            otherSame.color=old;
          }else{
            s.color=s.secondColor;
          }
        }

        // Rebuild faceColors and facelet
        const FO=['U','R','F','D','L','B'];
        FO.forEach(f=>{
          const faceStickers=nonC.filter(st=>st.face===f).sort((a,b)=>a.pos-b.pos);
          faceColors[f]=[];
          for(let i=0;i<9;i++){
            if(i===4) faceColors[f].push(CC[f]);
            else{
              const st=faceStickers.find(s=>s.pos===i);
              faceColors[f].push(st?st.color:'?');
            }
          }
        });

        let newFl='';FO.forEach(f=>{faceColors[f].forEach(x=>newFl+=C2F[x]||'?');});
        showFacePreviews('mgrid');
        tryAutoRepair(newFl, nonC, ambiguous, attempt+1);
      }else{
        document.getElementById('info').innerHTML='<span style="color:#E94560">自動修正失敗，請手動確認</span>';
        showEditableFaces();
        document.getElementById('btnRow').innerHTML='<button class="btn" onclick="finalizeSolve()">✅ 確認後解題</button>';
      }
    }, 4000);

    solverCB=(err,sol)=>{
      clearTimeout(solveTimeout);
      if(err){
        dbg('求解錯誤: '+err.message+', 重試...');
        tryAutoRepair(fl, nonC, ambiguous, attempt+1);
        return;
      }
      if(!sol||!sol.trim()){
        dbg('已解完（空解）');
        document.getElementById('doneOv').classList.add('show');
        return;
      }
      solution=sol.trim().split(/\s+/);
      dbg('✅ 求解成功！'+solution.length+'步');
      document.getElementById('info').innerHTML=`✅ 驗證成功！${attempt>0?'(修正了'+attempt+'次)':''}`;
      showFacePreviews('mgrid');
      document.getElementById('btnRow').innerHTML=
        `<button class="btn" onclick="startSolveMode()">🚀 模式1：最佳解 (${solution.length} 步)</button>`+
        `<button class="btn" style="background:rgba(0,210,255,.9);margin-top:6px" onclick="startLBLMode()">📚 模式2：學習解魔方</button>`;
    };
    solverWorker.postMessage({t:'solve',fl});
  }
  sendWhenReady();
}

// ===== REVERSE-TEACHING LBL ENGINE =====
// From a SOLVED cube, apply controlled scrambles per stage (in reverse order 7→1)
// Then guide the user through LBL steps to solve it back.
// Each stage's scramble is the INVERSE of its solve algorithm.

const LBL_STAGES=[
  {n:1,name:'白色十字',icon:'✚',desc:'在上白面排出白色十字，邊塊顏色要對齊側面中心',formula:'直覺',
   tip:'找到白色邊塊，把它轉到上白面，讓兩面顏色都對齊'},
  {n:2,name:'第一層角塊',icon:'🔲',desc:'用右手公式把白色角塊放到正確位置',formula:"R U R' U'",
   tip:'把白色角塊移到它的家的正上方，重複右手公式直到歸位'},
  {n:3,name:'第二層邊塊',icon:'⬛',desc:'把中間層的邊塊插入正確位置',formula:"U R U' R' U' F' U F",
   tip:'找到頂層沒有黃色的邊塊，讓它遠離目標方向，再用公式插入'},
  {n:4,name:'黃色十字',icon:'✚',desc:'在下黃面做出黃色十字',formula:"B R D R' D' B'",
   tip:'看下黃面的圖案：圓點→L形→一字→十字，每次一個公式'},
  {n:5,name:'黃色邊塊歸位',icon:'🔄',desc:'讓黃色十字的邊塊顏色對齊側面中心',formula:"R D R' D R D2 R'",
   tip:'找到一個已對齊的邊，放到後面，再執行公式交換其他三邊'},
  {n:6,name:'黃色角塊歸位',icon:'📐',desc:'把黃色角塊移到正確的角落（顏色可能還沒對）',formula:"D R D' L' D R' D' L",
   tip:'找到一個位置正確的角，放到右前方，再執行公式交換其他三角'},
  {n:7,name:'黃色角塊翻轉',icon:'🔁',desc:'翻轉角塊讓黃色面朝下，完成魔方！',formula:"R D R' D'",
   tip:'把未完成的角放到右前下方，重複公式直到黃色朝下，然後只轉D換下一個角'},
];

// Generate a controlled scramble for a specific stage range
// This creates a state where stages 1..targetStage need solving
function generateLBLScramble(targetStage){
  // Start from solved state
  const s={
    U:['W','W','W','W','W','W','W','W','W'],R:['B','B','B','B','B','B','B','B','B'],
    F:['R','R','R','R','R','R','R','R','R'],D:['Y','Y','Y','Y','Y','Y','Y','Y','Y'],
    L:['G','G','G','G','G','G','G','G','G'],B:['O','O','O','O','O','O','O','O','O']
  };
  function rotateCW(f){const a=s[f];s[f]=[a[6],a[3],a[0],a[7],a[4],a[1],a[8],a[5],a[2]];}
  function cycle(f){let t;switch(f){case'U':t=[s.F[0],s.F[1],s.F[2]];s.F[0]=s.R[0];s.F[1]=s.R[1];s.F[2]=s.R[2];s.R[0]=s.B[0];s.R[1]=s.B[1];s.R[2]=s.B[2];s.B[0]=s.L[0];s.B[1]=s.L[1];s.B[2]=s.L[2];s.L[0]=t[0];s.L[1]=t[1];s.L[2]=t[2];break;case'D':t=[s.F[6],s.F[7],s.F[8]];s.F[6]=s.L[6];s.F[7]=s.L[7];s.F[8]=s.L[8];s.L[6]=s.B[6];s.L[7]=s.B[7];s.L[8]=s.B[8];s.B[6]=s.R[6];s.B[7]=s.R[7];s.B[8]=s.R[8];s.R[6]=t[0];s.R[7]=t[1];s.R[8]=t[2];break;case'R':t=[s.F[2],s.F[5],s.F[8]];s.F[2]=s.D[2];s.F[5]=s.D[5];s.F[8]=s.D[8];s.D[2]=s.B[6];s.D[5]=s.B[3];s.D[8]=s.B[0];s.B[0]=s.U[8];s.B[3]=s.U[5];s.B[6]=s.U[2];s.U[2]=t[0];s.U[5]=t[1];s.U[8]=t[2];break;case'L':t=[s.F[0],s.F[3],s.F[6]];s.F[0]=s.U[0];s.F[3]=s.U[3];s.F[6]=s.U[6];s.U[0]=s.B[8];s.U[3]=s.B[5];s.U[6]=s.B[2];s.B[2]=s.D[6];s.B[5]=s.D[3];s.B[8]=s.D[0];s.D[0]=t[0];s.D[3]=t[1];s.D[6]=t[2];break;case'F':t=[s.U[6],s.U[7],s.U[8]];s.U[6]=s.L[8];s.U[7]=s.L[5];s.U[8]=s.L[2];s.L[2]=s.D[0];s.L[5]=s.D[1];s.L[8]=s.D[2];s.D[0]=s.R[6];s.D[1]=s.R[3];s.D[2]=s.R[0];s.R[0]=t[0];s.R[3]=t[1];s.R[6]=t[2];break;case'B':t=[s.U[0],s.U[1],s.U[2]];s.U[0]=s.R[2];s.U[1]=s.R[5];s.U[2]=s.R[8];s.R[2]=s.D[8];s.R[5]=s.D[7];s.R[8]=s.D[6];s.D[6]=s.L[0];s.D[7]=s.L[3];s.D[8]=s.L[6];s.L[0]=t[2];s.L[3]=t[1];s.L[6]=t[0];break;}}
  function doMove(mv){const f=mv[0],p=mv.includes("'"),d=mv.includes('2'),n=d?2:(p?3:1);for(let i=0;i<n;i++){rotateCW(f);cycle(f);}}
  function doMoves(str){str.trim().split(/\s+/).forEach(m=>{if(m)doMove(m);});}
  
  const scrambleMoves=[];  // moves applied to solved cube
  const solveMoves=[];     // the REVERSE = what user needs to do to solve
  const stageBreaks=[];    // {stage, solveStartIdx}

  // Scramble stages in reverse order (7→targetStage)
  // Each scramble is the INVERSE of its LBL algorithm
  
  // Stage 7 NOT included in auto-scramble (R D R' D' temporarily breaks first 2 layers)
  // Stage 7 is practiced separately as its own exercise
  
  if(targetStage<=6){
    // Stage 6: swap corners using D R D' L' D R' D' L
    doMoves("D R D' L' D R' D' L");
    stageBreaks.push({stage:6, moves:"D R D' L' D R' D' L"});
  }
  
  if(targetStage<=5){
    // Stage 5: cycle edges using R D R' D R D2 R'
    doMoves("R D R' D R D2 R'");
    stageBreaks.push({stage:5, moves:"R D R' D R D2 R'"});
  }
  
  if(targetStage<=4){
    // Stage 4: break yellow cross using B R D R' D' B'
    doMoves("B R D R' D' B'");
    stageBreaks.push({stage:4, moves:"B R D R' D' B'"});
  }
  
  return {state:s, stageBreaks};
}

// Start LBL practice for a given starting stage
function startLBLPractice(fromStage){
  const result=generateLBLScramble(fromStage);
  
  // Build the teaching steps: for each stage, show what to do
  const teachSteps=[];
  const breaks=result.stageBreaks.slice().reverse(); // reverse to get stage order (4,5,6,7)
  
  breaks.forEach(({stage, moves})=>{
    const stg=LBL_STAGES[stage-1];
    const mvArr=moves.trim().split(/\s+/);
    // The solve moves = same as scramble moves (these are self-inverse after correct reps)
    // Actually, to undo the scramble, we reverse the move list
    const solveMvs=mvArr.slice().reverse().map(m=>{
      if(m.includes("'"))return m.replace("'","");
      if(m.includes("2"))return m;
      return m+"'";
    });
    teachSteps.push({stage, title:'第'+stg.n+'關：'+stg.name, desc:stg.desc, formula:stg.formula, tip:stg.tip, moves:solveMvs});
  });
  
  // Show the scramble instruction first
  showLBLScrambleGuide(result.state, teachSteps, fromStage);
}

// Guided scramble: reuse the solve step UI
function startLBLScrambleGuide(){
  const scrambleMoves=window._lblScrambleMoves;
  const solvedState={U:['W','W','W','W','W','W','W','W','W'],R:['B','B','B','B','B','B','B','B','B'],F:['R','R','R','R','R','R','R','R','R'],D:['Y','Y','Y','Y','Y','Y','Y','Y','Y'],L:['G','G','G','G','G','G','G','G','G'],B:['O','O','O','O','O','O','O','O','O']};
  solution=scrambleMoves;
  ['U','R','F','D','L','B'].forEach(f=>cubeState[f]=[...solvedState[f]]);
  solveStep=-1;
  mode='solve';
  window._lblMode=true;
  window._lblScramblePhase=true;
  window._lblMarkers=[{stage:0,title:'🔀 打亂魔方',tip:'跟著箭頭一步步打亂',startIdx:0,endIdx:scrambleMoves.length-1}];
  showSolveStep();
}

// Start the LBL solve phase (after scramble is done)
function startLBLSolveGuide(){
  const teachSteps=window._lblTeachSteps;
  if(!teachSteps||teachSteps.length===0)return;
  const flatMoves=[];
  const stageMarkers=[];
  teachSteps.forEach(step=>{
    const si=flatMoves.length;
    step.moves.forEach(m=>flatMoves.push(m));
    stageMarkers.push({stage:step.stage,title:step.title,tip:step.tip,startIdx:si,endIdx:flatMoves.length-1});
  });
  solution=flatMoves;
  ['U','R','F','D','L','B'].forEach(f=>cubeState[f]=[...window._lblTargetState[f]]);
  solveStep=-1;
  mode='solve';
  window._lblMode=true;
  window._lblScramblePhase=false;
  window._lblMarkers=stageMarkers;
  showSolveStep();
}

// Item 4: Confetti celebration animation
function showConfetti(){
  const c=document.createElement('div');
  c.style.cssText='position:fixed;inset:0;z-index:999;pointer-events:none;overflow:hidden';
  const colors=['#FFD700','#00D2FF','#FF5800','#009B48','#B71234','#fff'];
  for(let i=0;i<40;i++){
    const p=document.createElement('div');
    const sz=6+Math.random()*8;
    const x=Math.random()*100;
    const delay=Math.random()*0.5;
    const dur=1+Math.random()*1.5;
    p.style.cssText=`position:absolute;left:${x}%;top:-10px;width:${sz}px;height:${sz}px;background:${colors[i%colors.length]};border-radius:${Math.random()>.5?'50%':'2px'};animation:confetti-fall ${dur}s ${delay}s ease-in forwards;opacity:0.9`;
    c.appendChild(p);
  }
  document.body.appendChild(c);
  setTimeout(()=>c.remove(),3000);
}

function showSolveStep(){
  document.getElementById('persp').classList.remove('show');

  if(solveStep===-1){
    // Initial: use botBar for "ready?" screen
    document.getElementById('solveUI').style.display='none';
    document.getElementById('botBar').style.display='block';
    document.getElementById('topBar').style.display='block';
    document.getElementById('title').textContent='🧊 準備好了嗎？';
    document.getElementById('sub').textContent='上白朝天，前紅對鏡頭';
    document.getElementById('dots').innerHTML='';
    document.getElementById('info').textContent=`共 ${solution.length} 步`;
    showGridIn('mgrid', cubeState['F']);
    document.getElementById('mgrid').style.display='grid';
    document.getElementById('btnRow').innerHTML='<button class="btn" onclick="nextMove()">開始第 1 步 →</button>';
    drawGuideGrid();
    return;
  }

  if(solveStep>=solution.length){
    // In LBL scramble phase: transition to solve phase
    if(window._lblScramblePhase){
      window._lblScramblePhase=false;
      showConfetti();
      const solveUI=document.getElementById('solveUI');
      solveUI.style.display='flex';
      solveUI.innerHTML='<div style="width:100%;max-width:360px;margin:0 auto;text-align:center;padding:20px 0">'+
        '<div style="font-size:40px;margin-bottom:8px">✅</div>'+
        '<div style="font-size:18px;font-weight:900;color:#FFD700;margin-bottom:8px">打亂完成！</div>'+
        '<div style="font-size:13px;color:rgba(255,255,255,.6);margin-bottom:16px;line-height:1.5">現在看看你的魔方<br>準備好用 LBL 公式把它還原！</div>'+
        '<button class="btn" onclick="startLBLSolveGuide()">🧩 開始還原教學！</button></div>';
      return;
    }
    // Normal completion
    showConfetti();
    document.getElementById('solveUI').style.display='none';
    document.getElementById('doneOv').classList.add('show');
    return;
  }

  // Switch to solve UI
  document.getElementById('botBar').style.display='none';
  document.getElementById('topBar').style.display='none';
  document.getElementById('solveUI').style.display='flex';

  const mv=solution[solveStep];
  const face=mv[0];
  const isB=face==='B';

  // Before: current state
  if(isB){
    showIsometricView('beforeGrid', cubeState['F'], cubeState['R']);
  }else{
    showGridIn('beforeGrid', cubeState['F']);
  }

  // Apply move temporarily to get "after" state
  applyMove(mv);
  const afterF=[...cubeState['F']];
  const afterR=[...cubeState['R']];
  // Undo so state stays at "before" until user clicks next
  undoMoveOnState(mv);

  // After
  if(isB){
    showIsometricView('afterGrid', afterF, afterR);
  }else{
    showGridIn('afterGrid', afterF);
  }

  // Move label
  document.getElementById('sMoveLabel').textContent=mv;
  const desc = (window._lblMode && MDESC_KID[mv]) ? MDESC_KID[mv] : (MDESC[mv]||mv);
  document.getElementById('sMoveDesc').textContent=desc;
  
  // LBL mode: show current stage label
  let progText=`第 ${solveStep+1} 步 / 共 ${solution.length} 步`;
  if(window._lblMode && window._lblMarkers){
    const markers=window._lblMarkers;
    let currentStg=null;
    for(const m of markers){
      if(solveStep>=m.startIdx && solveStep<=m.endIdx){currentStg=m;break;}
    }
    if(currentStg){
      progText=`📚 ${currentStg.title} — 第 ${solveStep+1} 步 / 共 ${solution.length} 步`;
      // Show tip at stage start
      if(solveStep===currentStg.startIdx && currentStg.tip){
        progText+=`\n💡 ${currentStg.tip}`;
      }
    }
    // Item 4: Confetti when completing a stage (transition to next)
    if(currentStg && solveStep===currentStg.endIdx && solveStep<solution.length-1){
      const nextStg=markers.find(m=>m.startIdx===solveStep+1);
      if(nextStg && nextStg.stage!==currentStg.stage){
        progText=`🎉 ${currentStg.title} 完成！`;
        // Trigger confetti on next button click (delayed)
        if(!window._lblCelebrated){
          window._lblCelebrated=solveStep;
          setTimeout(showConfetti,300);
        }
      }
    }else{
      window._lblCelebrated=null;
    }
    // Item 3: Stage 7 panic warning
    if(currentStg && currentStg.stage===7 && !window._lblScramblePhase){
      progText=`⚠️ 不要怕！下面會暫時亂掉，堅持做完就會恢復！\n${currentStg.title} — 第 ${solveStep+1} 步`;
    }
  }
  document.getElementById('sMoveProg').innerHTML=progText.replace(/\n/g,'<br>');

  // Step dots
  document.getElementById('sStepDots').innerHTML=
    `<div style="display:flex;gap:2px;flex-wrap:wrap;justify-content:center;max-width:300px;margin:0 auto">`+
    solution.map((m,i)=>`<div class="sd${i===solveStep?' now':''}${i<solveStep?' done':''}">${m.replace("'","'")}</div>`).join('')+
    `</div>`;

  // Perspective guide for B/D
  if(face==='B'||face==='D'){
    document.getElementById('persp').classList.add('show');
    drawPersp(mv);
  }

  // Move diagram in center
  drawMoveDiagram(mv);

  // Buttons
  document.getElementById('sBtnRow').innerHTML=
    `<button class="btn btn-sm" style="background:rgba(255,255,255,.15);color:#fff" onclick="prevMove()">← 上一步</button>`+
    `<button class="btn" onclick="nextMove()">${solveStep>=solution.length-1?'🎉 完成！':'下一步 →'}</button>`;
}

// Isometric F+R view for B moves: shows both faces at 45° angle
function showIsometricView(id, fColors, rColors){
  const el=document.getElementById(id);
  el.style.display='block';el.style.width='auto';el.style.gridTemplateColumns='';
  const w=160,h=120;
  const fs=60; // face size
  const cs=fs/3;
  // F face: left portion, slight perspective
  // R face: right portion, angled
  let svg=`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">`;
  
  // F face (front) - parallelogram leaning right
  const fx=10, fy=15;
  const skew=12; // perspective skew
  for(let r=0;r<3;r++)for(let c=0;c<3;c++){
    const x=fx+c*cs+r*1;
    const y=fy+r*cs;
    const col=CMAP[fColors[r*3+c]]||'#333';
    svg+=`<rect x="${x}" y="${y}" width="${cs-1}" height="${cs-1}" rx="2" fill="${col}" stroke="rgba(0,0,0,.3)" stroke-width="0.5"/>`;
  }
  // F label
  svg+=`<text x="${fx+fs/2}" y="${fy+fs+12}" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="10" font-family="sans-serif">前紅</text>`;
  
  // R face (right) - parallelogram, perspective angle
  const rx=fx+fs+4, ry=fy;
  const rSkewX=8; // horizontal compression for perspective
  const rSkewY=6; // vertical skew per column
  for(let r=0;r<3;r++)for(let c=0;c<3;c++){
    const x=rx+c*(cs-rSkewX/3)+r*1;
    const y=ry+r*cs+c*rSkewY;
    const cw=cs-rSkewX/3-1;
    const ch=cs-1;
    const col=CMAP[rColors[r*3+c]]||'#333';
    // Use polygon for perspective
    const pts=[
      [x, y],
      [x+cw, y+rSkewY/3],
      [x+cw, y+ch+rSkewY/3],
      [x, y+ch]
    ].map(([px,py])=>`${px},${py}`).join(' ');
    svg+=`<polygon points="${pts}" fill="${col}" stroke="rgba(0,0,0,.3)" stroke-width="0.5"/>`;
  }
  // R label
  svg+=`<text x="${rx+30}" y="${ry+fs+rSkewY*3+12}" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="10" font-family="sans-serif">右藍</text>`;
  
  svg+=`</svg>`;
  el.innerHTML=svg;
}

// Inline SVG move diagram for solve mode

function nextMove(){
  solveStep++;
  if(solveStep>0 && solveStep<=solution.length){
    // Apply the move we just completed
    applyMove(solution[solveStep-1]);
  }
  showSolveStep();
}

function prevMove(){
  if(solveStep<=0)return;
  // Undo current step
  undoMoveOnState(solution[solveStep-1]);
  solveStep--;
  showSolveStep();
}

// ===== DRAW MOVE OVERLAY =====
function drawMoveOverlay(mv){
  if(!ov.width)return;
  const vw=ov.width,vh=ov.height;
  octx.clearRect(0,0,vw,vh);
  const gs=Math.min(vw,vh)*0.82,cs=gs/3,sx=(vw-gs)/2,sy=(vh-gs)/2;

  // Light grid
  octx.strokeStyle='rgba(255,215,0,.3)';octx.lineWidth=1;
  for(let i=0;i<=3;i++){
    octx.beginPath();octx.moveTo(sx+i*cs,sy);octx.lineTo(sx+i*cs,sy+gs);octx.stroke();
    octx.beginPath();octx.moveTo(sx,sy+i*cs);octx.lineTo(sx+gs,sy+i*cs);octx.stroke();
  }

  const face=mv[0],prime=mv.includes("'"),dbl=mv.includes('2');
  octx.strokeStyle='#FFD700';octx.lineWidth=4;octx.lineCap='round';octx.fillStyle='#FFD700';
  octx.font='bold 16px Nunito';octx.textAlign='center';

  switch(face){
    case 'F': drawArc(sx+gs/2,sy+gs/2,gs*.4,prime,dbl); octx.fillText('前紅層',sx+gs/2,sy-10); break;
    case 'U': drawHArrow(sx,sy-10,gs,prime); hl(sx,sy,gs,cs,true); octx.fillText('上白層',sx+gs/2,sy-20); break;
    case 'D': drawHArrow(sx,sy+gs+10,gs,!prime); hl(sx,sy+gs-cs,gs,cs,true); octx.fillText('下黃層',sx+gs/2,sy+gs+30); break;
    case 'R': drawVArrow(sx+gs+10,sy,gs,prime); hl(sx+gs-cs,sy,cs,gs,false); octx.fillText('右藍',sx+gs+24,sy+gs/2+5); break;
    case 'L': drawVArrow(sx-10,sy,gs,!prime); hl(sx,sy,cs,gs,false); octx.fillText('左綠',sx-24,sy+gs/2+5); break;
    case 'B':
      octx.setLineDash([6,4]);octx.strokeStyle='rgba(255,215,0,.4)';octx.lineWidth=2;
      octx.strokeRect(sx-3,sy-3,gs+6,gs+6);octx.setLineDash([]);
      octx.fillStyle='#FFD700';octx.fillText('後橘層（見右下圖）',sx+gs/2,sy-10);
      break;
  }
}
function drawArc(cx,cy,r,prime,dbl){
  const dir=prime?-1:1,total=dbl?Math.PI*1.4:Math.PI*.85,start=-total/2;
  octx.beginPath();
  for(let i=0;i<=20;i++){const a=start+(total*i/20)*dir;const px=cx+Math.cos(a)*r,py=cy+Math.sin(a)*r;i?octx.lineTo(px,py):octx.moveTo(px,py);}
  octx.stroke();
  const ea=start+total*dir,tx=cx+Math.cos(ea)*r,ty=cy+Math.sin(ea)*r;
  const pa=start+total*.85*dir,ppx=cx+Math.cos(pa)*r,ppy=cy+Math.sin(pa)*r;
  arrowHead(tx,ty,tx-ppx,ty-ppy);
}
function drawHArrow(x,y,w,right){
  const x1=x+w*.15,x2=x+w*.85;
  octx.beginPath();
  if(right){octx.moveTo(x1,y);octx.lineTo(x2,y);arrowHead(x2,y,1,0);}
  else{octx.moveTo(x2,y);octx.lineTo(x1,y);arrowHead(x1,y,-1,0);}
  octx.stroke();
}
function drawVArrow(x,y,h,down){
  const y1=y+h*.15,y2=y+h*.85;
  octx.beginPath();
  if(down){octx.moveTo(x,y1);octx.lineTo(x,y2);arrowHead(x,y2,0,1);}
  else{octx.moveTo(x,y2);octx.lineTo(x,y1);arrowHead(x,y1,0,-1);}
  octx.stroke();
}
function hl(x,y,w,h){octx.fillStyle='rgba(255,215,0,.12)';octx.fillRect(x,y,w,h);octx.fillStyle='#FFD700';}
function arrowHead(x,y,dx,dy){
  const len=Math.sqrt(dx*dx+dy*dy)||1,ux=dx/len,uy=dy/len;
  octx.beginPath();
  octx.moveTo(x+ux*2,y+uy*2);
  octx.lineTo(x-12*ux+7*uy,y-12*uy-7*ux);
  octx.lineTo(x-12*ux-7*uy,y-12*uy+7*ux);
  octx.closePath();octx.fill();
}

// ===== CUBE STATE =====
function rotateCW(f){const s=cubeState[f];cubeState[f]=[s[6],s[3],s[0],s[7],s[4],s[1],s[8],s[5],s[2]];}
function rotateCCW(f){const s=cubeState[f];cubeState[f]=[s[2],s[5],s[8],s[1],s[4],s[7],s[0],s[3],s[6]];}
function cycle(f){
  const s=cubeState;let t;
  switch(f){
    case'U':t=[s.F[0],s.F[1],s.F[2]];s.F[0]=s.R[0];s.F[1]=s.R[1];s.F[2]=s.R[2];s.R[0]=s.B[0];s.R[1]=s.B[1];s.R[2]=s.B[2];s.B[0]=s.L[0];s.B[1]=s.L[1];s.B[2]=s.L[2];s.L[0]=t[0];s.L[1]=t[1];s.L[2]=t[2];break;
    case'D':t=[s.F[6],s.F[7],s.F[8]];s.F[6]=s.L[6];s.F[7]=s.L[7];s.F[8]=s.L[8];s.L[6]=s.B[6];s.L[7]=s.B[7];s.L[8]=s.B[8];s.B[6]=s.R[6];s.B[7]=s.R[7];s.B[8]=s.R[8];s.R[6]=t[0];s.R[7]=t[1];s.R[8]=t[2];break;
    case'R':t=[s.F[2],s.F[5],s.F[8]];s.F[2]=s.D[2];s.F[5]=s.D[5];s.F[8]=s.D[8];s.D[2]=s.B[6];s.D[5]=s.B[3];s.D[8]=s.B[0];s.B[0]=s.U[8];s.B[3]=s.U[5];s.B[6]=s.U[2];s.U[2]=t[0];s.U[5]=t[1];s.U[8]=t[2];break;
    case'L':t=[s.F[0],s.F[3],s.F[6]];s.F[0]=s.U[0];s.F[3]=s.U[3];s.F[6]=s.U[6];s.U[0]=s.B[8];s.U[3]=s.B[5];s.U[6]=s.B[2];s.B[2]=s.D[6];s.B[5]=s.D[3];s.B[8]=s.D[0];s.D[0]=t[0];s.D[3]=t[1];s.D[6]=t[2];break;
    case'F':t=[s.U[6],s.U[7],s.U[8]];s.U[6]=s.L[8];s.U[7]=s.L[5];s.U[8]=s.L[2];s.L[2]=s.D[0];s.L[5]=s.D[1];s.L[8]=s.D[2];s.D[0]=s.R[6];s.D[1]=s.R[3];s.D[2]=s.R[0];s.R[0]=t[0];s.R[3]=t[1];s.R[6]=t[2];break;
    case'B':t=[s.U[0],s.U[1],s.U[2]];s.U[0]=s.R[2];s.U[1]=s.R[5];s.U[2]=s.R[8];s.R[2]=s.D[8];s.R[5]=s.D[7];s.R[8]=s.D[6];s.D[6]=s.L[0];s.D[7]=s.L[3];s.D[8]=s.L[6];s.L[0]=t[2];s.L[3]=t[1];s.L[6]=t[0];break;
  }
}
function applyMove(mv){
  const f=mv[0],p=mv.includes("'"),d=mv.includes('2'),n=d?2:(p?3:1);
  for(let i=0;i<n;i++){rotateCW(f);cycle(f);}
}
function undoMoveOnState(mv){
  const f=mv[0],p=mv.includes("'"),d=mv.includes('2'),n=d?2:(p?1:3);
  for(let i=0;i<n;i++){rotateCW(f);cycle(f);}
}

// ===== DEBUG: Test solver with simulated data =====
function debugTestSolver(){
  document.getElementById('startOv').classList.remove('show');
  document.getElementById('topBar').style.display='block';
  document.getElementById('botBar').style.display='block';
  
  const dbgEl=document.getElementById('info');
  const log=s=>{dbgEl.innerHTML+=s+'<br>';console.log(s);};
  dbgEl.innerHTML='';
  log('🔧 開始測試求解器...');
  
  // Inject a known scramble: R U F applied to solved cube
  // Expected facelet: UUUUUULLDFBBFRRFRRFFRFFRDDRRRUDDBDDBFFDLLDLLBLLLUBBUBB
  const testFl='UUUUUULLDFBBFRRFRRFFRFFRDDRRRUDDBDDBFFDLLDLLBLLLUBBUBB';
  log('Facelet: '+testFl);
  
  // Step 1: Test worker creation
  log('Step 1: 建立 Worker...');
  try{
    if(solverWorker)solverWorker.terminate();
    initSolver();
    log('Worker 已建立, solverReady='+solverReady);
  }catch(e){
    log('❌ Worker 建立失敗: '+e.message);
    return;
  }
  
  // Step 2: Wait for ready
  log('Step 2: 等待 Worker 初始化...');
  let waitCount=0;
  function checkReady(){
    waitCount++;
    if(solverReady){
      log('✅ Worker 就緒 (等了 '+(waitCount*100)+'ms)');
      testSolve();
    }else if(waitCount>50){
      log('❌ Worker 初始化超時 (5秒)');
      log('solverReady='+solverReady);
    }else{
      dbgEl.innerHTML=dbgEl.innerHTML.replace(/等待中\.*/, '等待中'+'.'.repeat(waitCount%4));
      setTimeout(checkReady,100);
    }
  }
  checkReady();
  
  function testSolve(){
    log('Step 3: 發送求解請求...');
    
    const timeout=setTimeout(()=>{
      log('❌ 求解超時 (5秒)');
      log('Worker 可能卡在 initSolver() 的 lookup table 計算');
    },5000);
    
    solverCB=(err,sol)=>{
      clearTimeout(timeout);
      if(err){
        log('❌ 求解錯誤: '+err.message);
        return;
      }
      if(!sol||!sol.trim()){
        log('✅ 已經是還原狀態（空解）');
      }else{
        log('✅ 求解成功！');
        log('解法: '+sol.trim());
        log('步數: '+sol.trim().split(/\s+/).length);
        solution=sol.trim().split(/\s+/);
        
        // Also set up faceColors for mode selection
        const F2C={U:'W',R:'B',F:'R',D:'Y',L:'G',B:'O'};
        const FO=['U','R','F','D','L','B'];
        FO.forEach((f,fi)=>{
          faceColors[f]=[];
          for(let i=0;i<9;i++)faceColors[f].push(F2C[testFl[fi*9+i]]);
        });
        
        document.getElementById('btnRow').innerHTML=
          '<button class="btn" onclick="startSolveMode()">🚀 模式1：最佳解 ('+solution.length+' 步)</button>'+
          '<button class="btn" style="background:rgba(0,210,255,.9);margin-top:6px" onclick="startLBLMode()">📚 模式2：學習解魔方</button>';
      }
    };
    solverWorker.postMessage({t:'solve',fl:testFl});
  }
}

  const el=document.getElementById('dojoContent');
  let count=3;
  el.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:60vh"><div id="dojoCd" style="font-size:80px;font-weight:900;color:#FFD700">3</div></div>';
  
  const iv=setInterval(()=>{
    count--;
    if(count>0){
      document.getElementById('dojoCd').textContent=count;
    }else if(count===0){
      document.getElementById('dojoCd').textContent='GO!';
      document.getElementById('dojoCd').style.color='#00D2FF';
    }else{
      clearInterval(iv);
      dojoStart();
    }
  },800);
}

function dojoStart(){
  _dojoStartTime=performance.now();
  const ex=DOJO_EXERCISES.find(e=>e.id===_dojoExId);
  const el=document.getElementById('dojoContent');
  
  let h='<div style="width:100%;max-width:380px;margin:0 auto;text-align:center;padding:0 16px">';
  // Timer
  h+='<div id="dojoTime" style="font-size:56px;font-weight:900;color:#FFD700;font-family:monospace;margin-top:20px">0.00</div>';
  h+='<div style="font-size:12px;color:rgba(255,255,255,.4);margin-top:4px">秒</div>';
  
  // Steps reminder (compact)
  h+='<div style="margin-top:16px;font-size:13px;color:rgba(255,255,255,.5)">';
  h+=ex.steps.map((s,i)=>'<span style="color:#FFD700">'+(i+1)+'</span> '+s).join(' → ');
  h+='</div>';
  h+='<div style="font-size:12px;color:rgba(255,255,255,.3);margin-top:4px">重複 '+ex.reps+' 次</div>';
  
  // Giant stop button
  h+='<div style="margin-top:30px">';
  h+='<button class="btn" style="font-size:22px;padding:24px 60px;background:#E94560;width:90%;max-width:300px;border-radius:20px" onclick="dojoStop()">✋ 做完了！</button>';
  h+='</div>';
  h+='</div>';
  el.innerHTML=h;
  
  // Update timer
  _dojoTimer=setInterval(()=>{
    const t=(performance.now()-_dojoStartTime)/1000;
    const d=document.getElementById('dojoTime');
    if(d)d.textContent=t.toFixed(2);
  },50);
}

function dojoStop(){
  clearInterval(_dojoTimer);
  const elapsed=(performance.now()-_dojoStartTime)/1000;
  const ex=DOJO_EXERCISES.find(e=>e.id===_dojoExId);
  const el=document.getElementById('dojoContent');
  
  // Confirm
  let h='<div style="width:100%;max-width:380px;margin:0 auto;text-align:center;padding:0 16px">';
  h+='<div style="font-size:48px;font-weight:900;color:#FFD700;font-family:monospace;margin-top:20px">'+elapsed.toFixed(2)+'</div>';
  h+='<div style="font-size:14px;color:rgba(255,255,255,.5);margin-top:4px">秒</div>';
  
  h+='<div style="font-size:16px;color:#fff;font-weight:700;margin-top:20px">方塊有恢復原狀嗎？</div>';
  h+='<div style="font-size:12px;color:rgba(255,255,255,.4);margin-top:4px">做完 '+ex.reps+' 次後，6 面顏色應該跟開始一樣</div>';
  
  h+='<div style="display:flex;gap:10px;justify-content:center;margin-top:16px">';
  h+='<button class="btn" style="background:#009B48;padding:14px 32px;font-size:16px" onclick="dojoConfirm('+elapsed.toFixed(2)+',true)">✅ 是！恢復了</button>';
  h+='<button class="btn" style="background:rgba(255,255,255,.15);padding:14px 32px;font-size:16px" onclick="dojoConfirm('+elapsed.toFixed(2)+',false)">❌ 沒有</button>';
  h+='</div>';
  h+='</div>';
  el.innerHTML=h;
}

function dojoConfirm(time, success){
  const ex=DOJO_EXERCISES.find(e=>e.id===_dojoExId);
  const el=document.getElementById('dojoContent');
  
  if(!success){
    // Failed — encourage retry
    let h='<div style="width:100%;max-width:380px;margin:0 auto;text-align:center;padding:0 16px">';
    h+='<div style="font-size:48px;margin-top:30px">🤔</div>';
    h+='<div style="font-size:18px;font-weight:800;color:#fff;margin-top:12px">沒關係！再試一次</div>';
    h+='<div style="font-size:13px;color:rgba(255,255,255,.5);margin-top:8px;line-height:1.6">確認每一步的方向：</div>';
    h+='<div style="background:rgba(255,255,255,.06);border-radius:12px;padding:14px;margin:12px 0;text-align:left">';
    ex.steps.forEach((s,i)=>{
      h+='<div style="font-size:15px;color:#fff;padding:6px 0"><span style="color:#FFD700;font-weight:800;margin-right:8px">'+(i+1)+'</span>'+s+'</div>';
    });
    h+='</div>';
    h+='<button class="btn" style="margin-top:8px" onclick="startDojoExercise(\''+_dojoExId+'\')">🔄 再試一次</button>';
    h+='</div>';
    el.innerHTML=h;
    return;
  }
  
  // Success!
  showConfetti();
  const rank=dojoGetRank(time);
  const best=dojoGetBest(_dojoExId);
  const isNewBest=!best||time<best;
  if(isNewBest)dojoSetBest(_dojoExId,time);
  
  let h='<div style="width:100%;max-width:380px;margin:0 auto;text-align:center;padding:0 16px">';
  h+='<div style="font-size:64px;margin-top:20px">'+rank.emoji+'</div>';
  h+='<div style="font-size:48px;font-weight:900;color:'+rank.color+';font-family:monospace;margin-top:8px">'+time.toFixed(2)+'s</div>';
  h+='<div style="font-size:24px;font-weight:900;color:'+rank.color+';margin-top:8px">'+rank.rank+'</div>';
  
  if(isNewBest&&best){
    h+='<div style="font-size:14px;color:#FFD700;margin-top:8px;animation:confetti-fall 0.5s ease-out">🏆 新紀錄！（上次 '+best.toFixed(2)+'s）</div>';
  }
  
  h+='<div style="display:flex;gap:10px;justify-content:center;margin-top:20px">';
  h+='<button class="btn" style="background:rgba(0,210,255,.85)" onclick="startDojoExercise(\''+_dojoExId+'\')">🔄 再挑戰</button>';
  h+='<button class="btn" style="background:rgba(255,255,255,.15)" onclick="renderDojoMenu()">← 選其他</button>';
  h+='</div>';
  h+='</div>';
  el.innerHTML=h;
}
</script>
</body>
</html>
