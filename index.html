<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>魔方掃描器 v3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:#000;color:#fff;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.cam{position:relative;flex:1;overflow:hidden}
video{width:100%;height:100%;object-fit:cover}
canvas#ov{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
canvas#sm{display:none}

.hud{position:absolute;top:0;left:0;right:0;padding:12px 16px;text-align:center;z-index:10;background:linear-gradient(rgba(0,0,0,0.7),transparent);padding-bottom:30px}
.face-lbl{font-size:20px;font-weight:900;color:#FFD700;text-shadow:0 2px 6px rgba(0,0,0,0.9)}
.inst{font-size:14px;color:#eee;margin-top:2px;text-shadow:0 1px 4px rgba(0,0,0,0.8)}
.dots{display:flex;justify-content:center;gap:6px;margin-top:8px}
.dot{width:24px;height:5px;border-radius:3px;background:rgba(255,255,255,0.2)}
.dot.done{background:#00D2FF}
.dot.active{background:#FFD700;width:36px}

.bot{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:10px 12px;background:linear-gradient(transparent,rgba(0,0,0,0.8));padding-top:30px}
.det-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;width:100px;margin:0 auto 6px}
.det-cell{height:28px;border-radius:5px;border:1.5px solid rgba(255,255,255,0.3);font-size:8px;display:flex;align-items:center;justify-content:center;color:rgba(0,0,0,0.6);font-weight:700}
.status{text-align:center;font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:4px}
.debug{font-size:9px;color:rgba(255,255,255,0.35);text-align:center;word-break:break-all;max-height:40px;overflow:hidden}

.rotate-ov{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.75);z-index:25;flex-direction:column;align-items:center;justify-content:center}
.rotate-ov.show{display:flex}
.rotate-ov .icon{font-size:60px;animation:rh 1.5s ease-in-out infinite}
.rotate-ov .txt{font-size:20px;font-weight:800;margin-top:10px;color:#FFD700}
.rotate-ov .sub{font-size:14px;color:rgba(255,255,255,0.6);margin-top:4px}
.rotate-ov .countdown{font-size:48px;font-weight:900;color:#00D2FF;margin-top:16px}
@keyframes rh{0%,100%{transform:rotate(0deg)}50%{transform:rotate(15deg)}}

.start{position:absolute;inset:0;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30;gap:12px}
.start h1{font-size:28px;font-weight:900;color:#FFD700}
.start p{color:rgba(255,255,255,0.6);font-size:13px;max-width:280px;text-align:center;line-height:1.5}
.btn{padding:14px 32px;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-weight:800;font-size:16px;cursor:pointer;background:#FFD700;color:#000}

.result{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.9);z-index:30;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.result.show{display:flex}
.result h2{font-size:24px;font-weight:900;color:#FFD700;margin-bottom:8px}
.result .msg{font-size:15px;margin-bottom:12px;text-align:center}
.result .data{font-size:10px;color:rgba(255,255,255,0.4);word-break:break-all;margin-bottom:16px;text-align:center}
.result .face-preview{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
.result .mini-face{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;width:54px}
.result .mini-face .mc{width:16px;height:16px;border-radius:2px}
.result .face-title{font-size:10px;text-align:center;color:rgba(255,255,255,0.5);margin-bottom:2px}
</style>
</head>
<body>
<div class="cam">
  <video id="vid" autoplay playsinline muted></video>
  <canvas id="ov"></canvas>
  <canvas id="sm"></canvas>

  <div class="hud">
    <div class="face-lbl" id="fl">準備掃描</div>
    <div class="inst" id="inst">白色朝上，紅色面對鏡頭</div>
    <div class="dots" id="dots"></div>
  </div>

  <div class="bot" id="bot" style="display:none">
    <div class="status" id="sts">對準框框，保持不動</div>
    <div class="det-grid" id="dg" style="display:none"></div>
    <div class="debug" id="dbg"></div>
  </div>

  <div class="rotate-ov" id="rotOv">
    <div class="icon" id="rotIcon">↻</div>
    <div class="txt" id="rotTxt">順時針轉 90°</div>
    <div class="sub" id="rotSub">下一面：藍色中心</div>
    <div class="countdown" id="rotCD">3</div>
  </div>

  <div class="start" id="startScr">
    <h1>📷 魔方掃描器</h1>
    <p>用後鏡頭掃描 6 面<br>白色朝上，紅色面對鏡頭<br>在框框中靜止 = 自動拍照</p>
    <button class="btn" onclick="go()">開始掃描</button>
  </div>

  <div class="result" id="resultScr">
    <h2 id="resTitle">掃描結果</h2>
    <div class="msg" id="resMsg"></div>
    <div class="face-preview" id="resFaces"></div>
    <div class="data" id="resData"></div>
    <button class="btn" id="resBtn" onclick="location.reload()">重新開始</button>
  </div>
</div>

<script>
const SCAN=[
  {f:'F',cc:'R',name:'前面（紅）',guide:'白色朝上，紅色對鏡頭'},
  {f:'R',cc:'B',name:'右面（藍）',rot:'順時針轉 90°',arrow:'↻'},
  {f:'B',cc:'O',name:'後面（橘）',rot:'再順時針轉 90°',arrow:'↻'},
  {f:'L',cc:'G',name:'左面（綠）',rot:'再順時針轉 90°',arrow:'↻'},
  {f:'U',cc:'W',name:'上面（白）',rot:'往後傾，頂面對鏡頭',arrow:'↶'},
  {f:'D',cc:'Y',name:'下面（黃）',rot:'往前傾，底面對鏡頭',arrow:'↷'},
];
const CMAP={W:'#FFFFFF',R:'#B71234',B:'#0046AD',O:'#FF5800',G:'#009B48',Y:'#FFD500'};
const CC={F:'R',R:'B',B:'O',L:'G',U:'W',D:'Y'};
const C2F={W:'U',B:'R',R:'F',Y:'D',G:'L',O:'B'};

let vid,ov,octx,sm,sctx;
let scanning=false, idx=0, prevF=null, still=0;
let intv=null, faces={}, refs={}, rawData={};
const STILL_TH=0.05, STILL_N=8; // 8 frames × 200ms = 1.6 sec

function mkDots(){
  document.getElementById('dots').innerHTML=SCAN.map((_,i)=>
    `<div class="dot${i<idx?' done':''}${i===idx?' active':''}" id="d${i}"></div>`).join('');
}

async function go(){
  document.getElementById('startScr').style.display='none';
  vid=document.getElementById('vid');
  ov=document.getElementById('ov');
  octx=ov.getContext('2d');
  sm=document.getElementById('sm');
  sctx=sm.getContext('2d');
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
    vid.srcObject=s; await vid.play();
    ov.width=vid.videoWidth||720; ov.height=vid.videoHeight||1280;
    sm.width=64; sm.height=64;
    idx=0; mkDots(); startScan();
  }catch(e){alert('相機錯誤: '+e.message);}
}

function startScan(){
  const info=SCAN[idx];
  document.getElementById('fl').textContent=info.name;
  document.getElementById('inst').textContent=info.guide||'對準框框，保持不動';
  document.getElementById('bot').style.display='block';
  document.getElementById('dg').style.display='none';
  document.getElementById('sts').textContent='對準框框，保持不動';
  document.getElementById('dbg').textContent='';
  mkDots();
  scanning=true; prevF=null; still=0;
  if(intv)clearInterval(intv);
  intv=setInterval(tick,200);
}

function tick(){
  if(!scanning||!vid.videoWidth)return;
  sctx.drawImage(vid,0,0,64,64);
  const fr=sctx.getImageData(0,0,64,64);
  if(prevF){
    let diff=0;const tot=fr.data.length/4;
    for(let i=0;i<fr.data.length;i+=4){
      const d=(Math.abs(fr.data[i]-prevF.data[i])+Math.abs(fr.data[i+1]-prevF.data[i+1])+Math.abs(fr.data[i+2]-prevF.data[i+2]))/3;
      if(d>18)diff++;
    }
    const dr=diff/tot;
    if(dr<STILL_TH){
      still++;
      document.getElementById('sts').textContent=`靜止中 ${'●'.repeat(still)}${'○'.repeat(Math.max(0,STILL_N-still))}`;
      if(still>=STILL_N){capture();return;}
    }else{
      still=0;
      document.getElementById('sts').textContent='對準框框，保持不動';
    }
  }
  prevF=fr;
  drawOv();
}

function drawOv(){
  const vw=ov.width,vh=ov.height;
  octx.clearRect(0,0,vw,vh);
  const gs=Math.min(vw,vh)*0.55,cs=gs/3;
  const sx=(vw-gs)/2,sy=(vh-gs)/2;

  // Dim outside
  octx.fillStyle='rgba(0,0,0,0.3)';
  octx.fillRect(0,0,vw,sy);
  octx.fillRect(0,sy+gs,vw,vh-sy-gs);
  octx.fillRect(0,sy,sx,gs);
  octx.fillRect(sx+gs,sy,vw-sx-gs,gs);

  // Grid
  octx.strokeStyle='rgba(255,215,0,0.5)';
  octx.lineWidth=1.5;
  for(let i=0;i<=3;i++){
    octx.beginPath();octx.moveTo(sx+i*cs,sy);octx.lineTo(sx+i*cs,sy+gs);octx.stroke();
    octx.beginPath();octx.moveTo(sx,sy+i*cs);octx.lineTo(sx+gs,sy+i*cs);octx.stroke();
  }

  // Corners
  octx.strokeStyle='#FFD700';octx.lineWidth=3;
  const mk=16;
  [[sx,sy],[sx+gs,sy],[sx,sy+gs],[sx+gs,sy+gs]].forEach(([x,y])=>{
    const dx=x===sx?1:-1,dy=y===sy?1:-1;
    octx.beginPath();octx.moveTo(x+mk*dx,y);octx.lineTo(x,y);octx.lineTo(x,y+mk*dy);octx.stroke();
  });

  // Progress ring
  if(still>0){
    const ccx=sx+gs/2,ccy=sy+gs/2,prog=still/STILL_N;
    octx.strokeStyle='#00D2FF';octx.lineWidth=3;
    octx.beginPath();
    octx.arc(ccx,ccy,gs/2+15,-Math.PI/2,-Math.PI/2+prog*Math.PI*2);
    octx.stroke();
  }

  // Show live color sample dots
  if(vid.videoWidth){
    const tc=document.createElement('canvas');
    tc.width=vw;tc.height=vh;
    const tctx=tc.getContext('2d');
    tctx.drawImage(vid,0,0,vw,vh);
    for(let r=0;r<3;r++)for(let c=0;c<3;c++){
      const px=Math.round(sx+(c+0.5)*cs),py=Math.round(sy+(r+0.5)*cs);
      const d=tctx.getImageData(px-2,py-2,5,5);
      let rr=0,gg=0,bb=0;
      for(let i=0;i<d.data.length;i+=4){rr+=d.data[i];gg+=d.data[i+1];bb+=d.data[i+2];}
      const n=d.data.length/4;
      rr=Math.round(rr/n);gg=Math.round(gg/n);bb=Math.round(bb/n);
      // Small color dot
      octx.beginPath();
      octx.arc(px,py,8,0,Math.PI*2);
      octx.fillStyle=`rgb(${rr},${gg},${bb})`;
      octx.fill();
      octx.strokeStyle='rgba(255,255,255,0.6)';
      octx.lineWidth=1.5;
      octx.stroke();
    }
  }
}

function capture(){
  scanning=false;
  if(intv)clearInterval(intv);
  if(navigator.vibrate)navigator.vibrate(100);

  const vw=vid.videoWidth,vh=vid.videoHeight;
  const tc=document.createElement('canvas');
  tc.width=vw;tc.height=vh;
  const tctx=tc.getContext('2d');
  tctx.drawImage(vid,0,0,vw,vh);

  const gs=Math.min(vw,vh)*0.55,cs=gs/3;
  const sx=(vw-gs)/2,sy=(vh-gs)/2;
  const info=SCAN[idx];

  let rgbs=[];
  for(let r=0;r<3;r++)for(let c=0;c<3;c++){
    const px=Math.round(sx+(c+0.5)*cs),py=Math.round(sy+(r+0.5)*cs);
    const d=tctx.getImageData(px-5,py-5,11,11);
    let rr=0,gg=0,bb=0;
    for(let i=0;i<d.data.length;i+=4){rr+=d.data[i];gg+=d.data[i+1];bb+=d.data[i+2];}
    const n=d.data.length/4;
    rgbs.push([Math.round(rr/n),Math.round(gg/n),Math.round(bb/n)]);
  }

  rawData[info.f]=rgbs;

  // Show raw RGB preview
  const dg=document.getElementById('dg');
  dg.style.display='grid';
  dg.innerHTML=rgbs.map(([r,g,b],i)=>
    `<div class="det-cell" style="background:rgb(${r},${g},${b})">${i===4?'⭐':''}</div>`
  ).join('');
  document.getElementById('sts').textContent=`✅ ${info.name} 已拍攝`;

  setTimeout(()=>{
    idx++;
    if(idx>=SCAN.length){ globalClassify(); }
    else{ showRotate(); }
  }, 800);
}

// ===== GLOBAL CLASSIFICATION =====
function globalClassify(){
  document.getElementById('sts').textContent='分析 54 色塊中...';
  const FO=['U','R','F','D','L','B'];

  // Collect all 54 stickers
  const all=[];
  FO.forEach(f=>{
    const rgbs=rawData[f];
    if(!rgbs)return;
    for(let i=0;i<9;i++) all.push({face:f,pos:i,rgb:rgbs[i],color:null});
  });

  if(all.length!==54){showResult(false);return;}

  // 6 anchors from center stickers (pos=4)
  const anchors={};
  FO.forEach(f=>{ anchors[CC[f]]=rawData[f][4]; });

  // Fix centers
  all.forEach(s=>{ if(s.pos===4) s.color=CC[s.face]; });

  // Compute distance from each non-center to each anchor
  const nonC=all.filter(s=>s.pos!==4);
  nonC.forEach(s=>{
    s.dists={};
    Object.entries(anchors).forEach(([c,[ar,ag,ab]])=>{
      const [r,g,b]=s.rgb;
      s.dists[c]=Math.sqrt((r-ar)**2+(g-ag)**2+(b-ab)**2);
    });
  });

  // Greedy assignment: most confident first, each color max 9
  const cnt={W:1,R:1,B:1,O:1,G:1,Y:1};

  // Build flat list of (sticker, color, distance) sorted by distance
  const candidates=[];
  nonC.forEach(s=>{
    Object.entries(s.dists).forEach(([c,d])=>{
      candidates.push({s,c,d});
    });
  });
  candidates.sort((a,b)=>a.d-b.d);

  // Assign greedily
  candidates.forEach(({s,c,d})=>{
    if(s.color) return; // already assigned
    if(cnt[c]>=9) return; // color full
    s.color=c;
    cnt[c]++;
  });

  // Safety: assign any remaining
  nonC.filter(s=>!s.color).forEach(s=>{
    const avail=Object.entries(cnt).find(([c,n])=>n<9);
    if(avail){s.color=avail[0];cnt[avail[0]]++;}
  });

  // Build faces
  FO.forEach(f=>{
    faces[f]=all.filter(s=>s.face===f).sort((a,b)=>a.pos-b.pos).map(s=>s.color);
  });

  const anchorStr=Object.entries(anchors).map(([c,[r,g,b]])=>`${c}=(${r},${g},${b})`).join(' ');
  showResult(true, anchorStr);
}

// Result screen
function showResult(dataOk, extra){
  document.getElementById('bot').style.display='none';
  const rs=document.getElementById('resultScr');
  rs.classList.add('show');

  const FO=['U','R','F','D','L','B'];

  // Build facelet
  let fl='';
  FO.forEach(f=>{
    const c=faces[f];
    if(!c){fl+='?????????';return;}
    c.forEach(x=>fl+=C2F[x]||'?');
  });

  const cnt={};
  for(const ch of fl)cnt[ch]=(cnt[ch]||0)+1;
  const ok=!fl.includes('?')&&Object.values(cnt).every(v=>v===9);

  // Face previews
  const fp=document.getElementById('resFaces');
  fp.innerHTML='';
  FO.forEach(f=>{
    const c=faces[f];
    if(!c)return;
    const d=document.createElement('div');
    d.innerHTML=`<div class="face-title">${f}(${CC[f]==='W'?'白':CC[f]==='R'?'紅':CC[f]==='B'?'藍':CC[f]==='O'?'橘':CC[f]==='G'?'綠':'黃'})</div><div class="mini-face">${c.map(x=>`<div class="mc" style="background:${CMAP[x]}"></div>`).join('')}</div>`;
    fp.appendChild(d);
  });

  if(ok){
    document.getElementById('resTitle').textContent='✅ 掃描成功！';
    document.getElementById('resMsg').innerHTML=`<span style="color:#00D2FF">每色 9 格 ✓</span>`;
    document.getElementById('resData').textContent=fl+(extra?'\n'+extra:'');
    document.getElementById('resBtn').textContent='複製 Facelet';
    document.getElementById('resBtn').onclick=()=>{
      navigator.clipboard.writeText(fl).catch(()=>{});
      alert('已複製！\n'+fl);
    };
  }else{
    document.getElementById('resTitle').textContent='⚠️ 數量異常';
    document.getElementById('resMsg').innerHTML=`<span style="color:#E94560">${JSON.stringify(cnt)}</span>`;
    document.getElementById('resData').textContent=fl+(extra?'\n'+extra:'');
    document.getElementById('resBtn').textContent='重新開始';
    document.getElementById('resBtn').onclick=()=>location.reload();
  }
}

// Wake lock
(async()=>{try{await navigator.wakeLock.request('screen')}catch(e){}})();
</script>
</body>
</html>
